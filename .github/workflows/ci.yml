name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

# Validate via the pull_request event (not also push) so a branch with an open
# PR doesn't run CI twice, and cancel superseded runs when a branch is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run tsc

      - name: Unit tests
        run: npm run test:ci

      - name: Web build smoke test
        run: npm run build:web

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end playthrough
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
