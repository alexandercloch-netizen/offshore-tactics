name: Refresh weather climatology

# Re-bakes src/data/weatherClimatology.ts from real Open-Meteo data on a
# schedule (and on demand). GitHub's runners have open internet, so unlike the
# dev sandbox they can reach the Open-Meteo archive — this is how live data
# actually gets into the repo. The job opens a PR so the change runs through CI
# (tsc, tests, e2e) before it lands, rather than committing to main directly.
#
# Note: for the opened PR to trigger CI (and so auto-merge), the checkout/PR must
# use a Personal Access Token, because PRs created with the default GITHUB_TOKEN
# do not start workflows. Add a fine-grained PAT (contents + pull-requests:
# write) as the `WEATHER_REFRESH_TOKEN` secret. Without it the PR still opens,
# but you'll need to nudge CI manually (e.g. close/reopen the PR).

on:
  schedule:
    - cron: '0 6 1 * *' # 06:00 UTC on the 1st of each month
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-weather
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WEATHER_REFRESH_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bake real weather from Open-Meteo
        run: node scripts/build-weather.mjs

      - name: Type-check the generated data
        run: npm run tsc

      - name: Open a refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.WEATHER_REFRESH_TOKEN || github.token }}
          add-paths: src/data/weatherClimatology.ts
          branch: bot/weather-refresh
          delete-branch: true
          base: main
          commit-message: 'chore(weather): refresh climatology from Open-Meteo'
          title: 'Refresh weather climatology from Open-Meteo'
          body: |
            Automated re-bake of `src/data/weatherClimatology.ts` from the
            Open-Meteo archive (see `scripts/build-weather.mjs`). Ranked races
            stay deterministic — this only updates each race's seasonal baseline.

            Merges itself once CI is green.
          labels: weather, automated

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.WEATHER_REFRESH_TOKEN || github.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
